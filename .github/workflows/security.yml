name: security
# Closes Phase 2.1 of the 2026-05-05 SOC 2 Type II remediation roadmap.
# Stops PRs that introduce HIGH or CRITICAL security findings from merging.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (HIGH+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm audit --audit-level=high

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container: { image: semgrep/semgrep:latest }
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/javascript \
            --severity ERROR --severity WARNING \
            --error --metrics=off

  osv-scanner:
    name: OSV multi-ecosystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with: { scan-args: "--recursive --skip-git ./" }

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
