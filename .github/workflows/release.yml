name: release
# SBOM + cosign signature on every published tag.
# Closes Phase 2.2 + Phase 2.3 of the 2026-05-05 SOC 2 Type II remediation roadmap.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write   # required by cosign keyless OIDC signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', registry-url: 'https://registry.npmjs.org' }
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run build

      - name: Generate SBOM (CycloneDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft dir:. -o cyclonedx-json=sbom-${{ github.ref_name }}.json
          syft dir:. -o spdx-json=sbom-${{ github.ref_name }}.spdx.json

      - name: Pack tarball
        run: npm pack

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign tarball + SBOM (keyless OIDC)
        run: |
          for f in *.tgz sbom-${{ github.ref_name }}.json sbom-${{ github.ref_name }}.spdx.json; do
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" "$f"
          done

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach SBOM + signatures to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            *.tgz.sig
            *.tgz.pem
            sbom-${{ github.ref_name }}.json
            sbom-${{ github.ref_name }}.json.sig
            sbom-${{ github.ref_name }}.json.pem
            sbom-${{ github.ref_name }}.spdx.json
